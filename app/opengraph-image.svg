<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Black background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="#D4AF37" opacity="0.1"/>
  <circle cx="1100" cy="530" r="100" fill="#D4AF37" opacity="0.1"/>
  
  <!-- Border -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  
  <!-- Main text -->
  <text x="600" y="200" font-size="80" font-weight="300" text-anchor="middle" fill="#D4AF37" font-family="serif" letter-spacing="3">
    ULTIMATE
  </text>
  
  <text x="600" y="300" font-size="80" font-weight="300" text-anchor="middle" fill="#D4AF37" font-family="serif" letter-spacing="3">
    COLLECTIONS
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="380" font-size="36" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-weight="300">
    Premium Jewellery & Fashion
  </text>
  
  <!-- Tagline -->
  <text x="600" y="440" font-size="20" text-anchor="middle" fill="#D4AF37" font-family="sans-serif" font-weight="300" opacity="0.8">
    Handcrafted Elegance for Every Occasion
  </text>
  
  <!-- Decorative diamonds -->
  <polygon points="300,80 310,100 300,120 290,100" fill="#D4AF37" opacity="0.6"/>
  <polygon points="900,550 910,570 900,590 890,570" fill="#D4AF37" opacity="0.6"/>
</svg>