<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#000000"/>
  
  <!-- Decorative circles -->
  <circle cx="20" cy="20" r="3" fill="#D4AF37" opacity="0.6"/>
  <circle cx="80" cy="20" r="3" fill="#D4AF37" opacity="0.6"/>
  <circle cx="20" cy="80" r="3" fill="#D4AF37" opacity="0.6"/>
  <circle cx="80" cy="80" r="3" fill="#D4AF37" opacity="0.6"/>
  
  <!-- Central border -->
  <rect x="15" y="15" width="70" height="70" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Text: UC -->
  <text
    x="50"
    y="58"
    font-size="36"
    font-weight="300"
    text-anchor="middle"
    fill="#D4AF37"
    font-family="serif"
    letter-spacing="4">
    UC
  </text>
  
  <!-- Bottom text -->
  <text
    x="50"
    y="75"
    font-size="8"
    text-anchor="middle"
    fill="#D4AF37"
    font-family="serif"
    opacity="0.7"
    letter-spacing="2">
    COLLECTIONS
  </text>
  
  <!-- Decorative diamond shapes -->
  <polygon points="50,22 53,28 50,34 47,28" fill="#D4AF37" opacity="0.5"/>
  <polygon points="50,68 53,74 50,80 47,74" fill="#D4AF37" opacity="0.5"/>
</svg>