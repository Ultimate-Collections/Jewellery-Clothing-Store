<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Black background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="twitterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#twitterGrad)"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="150" r="100" fill="#D4AF37" opacity="0.08"/>
  <circle cx="1050" cy="480" r="120" fill="#D4AF37" opacity="0.08"/>
  
  <!-- Main text -->
  <text x="600" y="220" font-size="72" font-weight="300" text-anchor="middle" fill="#D4AF37" font-family="serif" letter-spacing="2">
    ULTIMATE
  </text>
  
  <text x="600" y="310" font-size="72" font-weight="300" text-anchor="middle" fill="#D4AF37" font-family="serif" letter-spacing="2">
    COLLECTIONS
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="390" font-size="32" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-weight="300">
    Premium Handcrafted Jewellery
  </text>
  
  <!-- Bottom tagline -->
  <text x="600" y="480" font-size="24" text-anchor="middle" fill="#D4AF37" font-family="sans-serif" font-weight="300">
    Festival Ready Elegance ✦
  </text>
  
  <!-- Decorative line -->
  <line x1="300" y1="520" x2="900" y2="520" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
</svg>